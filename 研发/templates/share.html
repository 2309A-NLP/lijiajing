<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DeepRole - 分享</title>
<style>
:root{--bg:#f5f6fa;--chat:#eef0f5;--text:#1a1a2e;--sub:#6b7280;--acc:#4f46e5;--alc:#eef2ff;--bd:#e5e7eb;--grn:#059669}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#e8ebf2;height:100vh;display:flex;justify-content:center;align-items:center}
.app{width:96%;max-width:750px;height:92vh;background:#fff;border-radius:22px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 6px 40px rgba(0,0,0,0.07)}
.tb{padding:16px 22px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.tb .logo{width:36px;height:36px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;box-shadow:0 3px 10px rgba(79,70,229,0.2)}
.tb .nm{font-weight:700;font-size:15px;color:var(--text)}.tb .bdg{font-size:10px;background:var(--alc);color:var(--acc);padding:4px 10px;border-radius:10px;margin-left:auto}
.role-bar{padding:10px 22px;background:#fff;border-bottom:1px solid var(--bd);display:flex;gap:6px;flex-wrap:wrap}
.rc{padding:6px 12px;border-radius:14px;border:2px solid var(--bd);font-size:11px;cursor:pointer;transition:.2s;background:#fff;color:var(--sub)}.rc.on{background:var(--alc);color:var(--acc);border-color:var(--acc);font-weight:600}
.ca{flex:1;padding:18px 22px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:var(--chat)}
.ca::-webkit-scrollbar{width:3px}.ca::-webkit-scrollbar-thumb{background:#ccc;border-radius:10px}
.msg{max-width:72%;animation:in .25s ease}@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.mu{align-self:flex-end}.ma{align-self:flex-start}
.bb{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word}
.mu .bb{background:var(--acc);color:#fff;border-bottom-right-radius:4px}
.ma .bb{background:#fff;color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--bd)}
.mn{font-size:10px;color:var(--sub);margin-bottom:2px}.mu .mn{display:none}.mt{font-size:9px;color:#aaa;text-align:right;margin-top:3px}
.nb{padding:12px 22px;background:#fff;border-top:1px solid var(--bd);display:flex;gap:8px;align-items:center}
.nb input{flex:1;padding:10px;border-radius:14px;border:2px solid var(--bd);font-size:12px;outline:none}.nb input:focus{border-color:var(--acc)}
.nb button{padding:10px 16px;border-radius:14px;border:none;background:var(--acc);color:#fff;font-size:12px;cursor:pointer;font-weight:600}
.nb button:disabled{opacity:0.5}.nick-ok{font-size:11px;color:var(--grn)}
.ia{padding:14px 22px;background:#fff;border-top:1px solid var(--bd);display:flex;gap:8px}
.ia input{flex:1;padding:10px 14px;border-radius:20px;border:2px solid var(--bd);background:var(--chat);font-size:13px;outline:none}.ia input:focus{border-color:var(--acc)}
.ia input:disabled{opacity:0.5}
.ia button{width:38px;height:38px;border-radius:50%;border:none;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:15px;cursor:pointer;flex-shrink:0}.ia button:disabled{opacity:0.5}
.typ{display:none;align-self:flex-start;padding:8px 14px;background:#fff;border-radius:12px;border:1px solid var(--bd)}
.typ span{display:inline-block;width:5px;height:5px;border-radius:50%;background:#c4b5fd;margin:0 1px;animation:bnc 1.3s infinite}
.typ span:nth-child(2){animation-delay:.15s}.typ span:nth-child(3){animation-delay:.3s}
@keyframes bnc{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
</style>
</head>
<body>
<div class="app">
<div class="tb"><div class="logo">🧠</div><span class="nm">DeepRole 分享</span><span class="bdg" id="ob">全角色体验</span></div>
<div class="role-bar" id="rb">
<span class="rc on" onclick="sr('虚拟朋友',this)">👥 朋友</span>
<span class="rc" onclick="sr('心理医生',this)">🏥 医生</span>
<span class="rc" onclick="sr('律师',this)">⚖️ 律师</span>
<span class="rc" onclick="sr('投资分析师',this)">📈 分析师</span>
<span class="rc" onclick="sr('奶茶师',this)">🧋 奶茶师</span>
</div>
<div class="ca" id="ca">
<div class="ma msg"><div class="bb"><div class="mn">系统</div>欢迎！起个昵称后选择角色开始对话~<div class="mt">现在</div></div></div>
<div class="typ" id="ty"><span></span><span></span><span></span></div>
</div>
<div class="nb"><span style="font-size:11px;color:var(--sub)">👤</span><input id="nn" placeholder="给自己起个昵称" maxlength="20" onkeypress="if(event.key==='Enter')sn()"><button id="nbtn" onclick="sn()">确认</button><span class="nick-ok" id="nok"></span></div>
<div class="ia"><input id="mi" placeholder="请先输入昵称..." disabled><button id="sbx" onclick="sd()" disabled>↑</button></div>
</div>
<script>
var sc=window.location.pathname.split('/s/')[1].replace('#all','');
var rt='虚拟朋友',nn='';
fetch('/api/share_info?code='+sc).then(function(r){return r.json()}).then(function(d){if(d.ok)document.getElementById('ob').textContent='分享自 '+d.owner});
function sr(r,e){rt=r;document.querySelectorAll('.rc').forEach(function(c){c.classList.remove('on')});e.classList.add('on')}
function sn(){nn=document.getElementById('nn').value.trim();if(!nn)return;document.getElementById('mi').disabled=false;document.getElementById('sbx').disabled=false;document.getElementById('mi').placeholder='输入消息...';document.getElementById('mi').focus();document.getElementById('nbtn').disabled=true;document.getElementById('nn').disabled=true;document.getElementById('nok').textContent='✅ 就绪'}
async function sd(){if(!nn)return;var m=document.getElementById('mi').value.trim();if(!m)return;am('user',m);document.getElementById('mi').value='';document.getElementById('ty').style.display='block';scd();try{var r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'share_'+nn,role_type:rt,message:m,share_code:sc})});var d=await r.json();document.getElementById('ty').style.display='none';am('assistant',d.response)}catch(e){document.getElementById('ty').style.display='none';am('assistant','网络错误')}scd()}
function am(r,t){var a=document.getElementById('ca'),ty=document.getElementById('ty'),d=document.createElement('div');d.className='msg '+(r==='user'?'mu':'ma');var tm=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});d.innerHTML='<div class="bb">'+(r!=='user'?'<div class="mn">'+rt+'</div>':'')+t+'<div class="mt">'+tm+'</div></div>';a.insertBefore(d,ty)}
function scd(){setTimeout(function(){var a=document.getElementById('ca');a.scrollTop=a.scrollHeight},50)}
</script>
</body>
</html>
