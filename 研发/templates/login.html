<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DeepRole - 登录</title>
<style>
:root{--bg:#f7f8fc;--card:#fff;--text:#1a1a2e;--sub:#6b7280;--acc:#4f46e5;--alc:#eef2ff;--bd:#e5e7ea;--green:#059669;--red:#dc2626}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f0f2ff,#f7f8fc,#e8edff);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg-dots{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.35;background-image:radial-gradient(rgba(79,70,229,0.12)1px,transparent 1px);background-size:20px 20px}
.container{z-index:1;background:var(--card);border-radius:18px;padding:36px 32px;width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.03);text-align:center}
.logo{width:44px;height:44px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;color:#fff;margin-bottom:12px;box-shadow:0 4px 14px rgba(79,70,229,0.2)}
h1{font-size:18px;font-weight:700;color:var(--text)}.sub{font-size:11px;color:var(--sub);margin:4px 0 20px}
.tabs{display:flex;background:#f3f4f6;border-radius:8px;padding:3px;margin-bottom:18px}
.tab{flex:1;padding:8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--sub);border:none;background:transparent;transition:.2s}
.tab.on{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
.fg{margin-bottom:12px;text-align:left}.fg label{font-size:11px;font-weight:600;color:var(--text);display:block;margin-bottom:4px}
.fg input{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--bd);font-size:13px;outline:none;background:var(--bg);transition:.2s}
.fg input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--alc)}
.btn{width:100%;padding:11px;border-radius:8px;border:none;background:var(--acc);color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;transition:.2s}
.btn:hover{opacity:0.9}
.msg{font-size:10px;margin-top:5px;min-height:16px}.msg.e{color:var(--red)}.msg.o{color:var(--green)}
.tags{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-top:14px}
.tag{font-size:9px;padding:2px 7px;border-radius:8px;background:#f3f4f6;color:var(--sub);border:1px solid var(--bd)}
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="container">
<div class="logo">🐱</div>
<h1>🌟DeepRole🌟</h1>
<div class="sub">智能角色扮演系统 · 7角色 · RAG驱动</div>
<div class="tabs"><button class="tab on" onclick="sw('login')">登录</button><button class="tab" onclick="sw('reg')">注册</button></div>
<div id="lf"><div class="fg"><label>用户名</label><input id="lu" placeholder="请输入用户名"></div><div class="fg"><label>密码</label><input id="lp" type="password" placeholder="请输入密码"></div><div class="msg e" id="le"></div><button class="btn" onclick="lo()">登 录</button></div>
<div id="rf" style="display:none"><div class="fg"><label>用户名</label><input id="ru" placeholder="至少2个字符"></div><div class="fg"><label>密码</label><input id="rp" type="password" placeholder="至少2个字符"></div><div class="msg e" id="re"></div><button class="btn" onclick="reg()">注 册</button></div>
<div class="tags"><span class="tag">FastAPI</span><span class="tag">MySQL</span><span class="tag">Redis</span><span class="tag">Milvus</span><span class="tag">BGE-M3</span><span class="tag">DeepSeek</span><span class="tag">RAG</span></div>
</div>
<script>
function sw(t){document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});event.target.classList.add('on');document.getElementById('lf').style.display=t==='login'?'block':'none';document.getElementById('rf').style.display=t==='reg'?'block':'none'}
async function reg(){var u=document.getElementById('ru').value.trim(),p=document.getElementById('rp').value.trim();if(!u||u.length<2||!p||p.length<2){document.getElementById('re').textContent='至少2个字符';return}var r=await fetch('/api/register?u='+encodeURIComponent(u)+'&p='+encodeURIComponent(p),{method:'POST'});var d=await r.json();if(d.ok){localStorage.setItem('uname',u);window.location.href='/splash'}else{document.getElementById('re').textContent=d.msg}}
async function lo(){
    var u=document.getElementById('lu').value.trim();
    var p=document.getElementById('lp').value.trim();
    if(!u||!p){
        document.getElementById('le').textContent='请填写用户名和密码';
        return;
    }
    var r=await fetch('/api/login?u='+encodeURIComponent(u)+'&p='+encodeURIComponent(p),{method:'POST'});
    var d=await r.json();
    if(d.ok){
        localStorage.setItem('uname',u);
        if(d.profile){
            localStorage.setItem('profile',d.profile);
        }
        window.location.href='/splash';
    }else{
        document.getElementById('le').textContent=d.msg;
    }
}</script>
</body>
</html>
